<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#f7f7f5"/>
<title>Lab Packages</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: #f7f7f5; color: #111; min-height: 100vh; padding-bottom: 100px; }

/* header */
.header { background: #f7f7f5; border-bottom: 1px solid #222; padding: 16px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; font-weight: 500; letter-spacing: -0.02em; }
.header-sub { font-size: 11px; color: #666; margin-top: 1px; }
.sync-pill { display: flex; align-items: center; gap: 5px; background: #ffffff; border: 1px solid #e0e0de; border-radius: 20px; padding: 5px 10px; font-size: 11px; color: #888; white-space: nowrap; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #3a8f1f; }
.dot.off { background: #dc2626; }
.dot.spin { background: #d97706; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

/* main content */
.content { padding: 12px 14px; max-width: 600px; margin: 0 auto; }

/* stats */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.stat { background: #ffffff; border: 1px solid #e8e8e6; border-radius: 10px; padding: 12px 10px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 500; color: #111; letter-spacing: -0.03em; }
.stat-l { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

/* search */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #999; pointer-events: none; }
.search { width: 100%; padding: 10px 12px 10px 34px; background: #ffffff; border: 1px solid #e0e0de; border-radius: 10px; color: #111; font-family: inherit; font-size: 14px; outline: none; }
.search::placeholder { color: #bbb; }
.search:focus { border-color: #bbb; }

/* chips */
.chips { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; border: 1px solid #e0e0de; background: #ffffff; color: #666; cursor: pointer; font-family: inherit; }
.chip.on { background: rgba(58,143,31,.1); border-color: rgba(58,143,31,.4); color: #3a8f1f; }

/* item cards */
.item { background: #ffffff; border: 1px solid #e8e8e6; border-radius: 12px; display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
.item:active { background: #f0f0ee; }
.thumb { width: 52px; height: 52px; border-radius: 8px; background: #f0f0ee; border: 1px solid #e0e0de; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb svg { color: #bbb; }
.info { flex: 1; min-width: 0; }
.iname { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #111; }
.isub { font-size: 12px; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tags { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
.tag-blue { background: rgba(37,99,235,.1); color: #1d4ed8; }
.tag-green { background: rgba(21,128,61,.1); color: #166534; }
.tag-new { background: rgba(0,0,0,.07); color: #555; }
.idate { font-size: 10px; color: #bbb; font-family: 'DM Mono', monospace; flex-shrink: 0; }

/* empty */
.empty { text-align: center; padding: 60px 20px; color: #999; }
.empty h3 { font-size: 15px; color: #888; margin: 10px 0 6px; }

/* FAB */
.bottom-bar {
  position: sticky;
  top: 56px;
  z-index: 9;
  padding: 10px 14px;
  background: #f7f7f5;
  border-bottom: 1px solid #e8e8e6;
}
.bottom-add-btn {
  width: 100%;
  padding: 14px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  letter-spacing: -0.01em;
}
.bottom-add-btn:active { opacity: .8; }
.fab { position: fixed; bottom: 90px; right: 20px; width: 64px; height: 64px; border-radius: 50%; background: #111; color: #fff; border: 3px solid #fff; font-size: 28px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(0,0,0,.35); z-index: 999; }
.fab:active { transform: scale(.93); }

/* overlay + sheet */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { background: #ffffff; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding-bottom: 30px; }
.handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto; }
.sheet-hdr { padding: 4px 16px 14px; display: flex; align-items: center; border-bottom: 1px solid #222; gap: 10px; }
.sheet-hdr h2 { font-size: 15px; font-weight: 500; flex: 1; letter-spacing: -.01em; }
.x-btn { width: 28px; height: 28px; border-radius: 50%; background: #f0f0ee; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #888; flex-shrink: 0; }
.sheet-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

/* photo strip */
.photo-strip { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.photo-strip::-webkit-scrollbar { display: none; }
.ptile { position: relative; width: 80px; height: 80px; flex-shrink: 0; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0de; }
.ptile img { width: 100%; height: 100%; object-fit: cover; }
.pdel { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,.55); border: none; border-radius: 50%; color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.padd { width: 80px; height: 80px; flex-shrink: 0; border-radius: 8px; border: 1.5px dashed #ccc; background: #f0f0ee; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: #999; font-size: 11px; }
.padd svg { width: 20px; height: 20px; }

/* AI status */
.ai-box { display: flex; align-items: center; gap: 8px; background: #f0f0ee; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #888; border: 1px solid #e0e0de; }
.spinner { width: 12px; height: 12px; border: 1.5px solid #ddd; border-top-color: #555; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* form */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: #999; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; }
.field input, .field select { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #e0e0de; border-radius: 8px; background: #f0f0ee; color: #111; font-family: inherit; outline: none; appearance: none; -webkit-appearance: none; }
.field input:focus, .field select:focus { border-color: #999; }
.field input::placeholder { color: #bbb; }
.field select option { background: #f0f0ee; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btns { display: flex; gap: 8px; }
.btn { padding: 12px; font-size: 14px; border-radius: 8px; border: 1px solid #e0e0de; background: #f0f0ee; color: #111; cursor: pointer; font-family: inherit; font-weight: 500; flex: 1; }
.btn:active { opacity: .7; }
.btn-g { background: #111; color: #fff; border-color: #111; }
.btn-g:disabled { opacity: .35; cursor: not-allowed; }
.btn-r { color: #dc2626; border-color: rgba(255,92,92,.2); background: rgba(255,92,92,.06); }

/* detail */
.dphotos { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.dphotos::-webkit-scrollbar { display: none; }
.dphotos img { height: 130px; width: auto; border-radius: 8px; object-fit: cover; border: 1px solid #e0e0de; flex-shrink: 0; }
.drow { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0ee; gap: 12px; font-size: 13px; }
.drow:last-child { border: none; }
.dk { color: #999; flex-shrink: 0; }
.dv { color: #333; text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header h1" style="font-size:16px;font-weight:500;letter-spacing:-.02em">📦 Lab Packages</div>
    <div class="header-sub" id="header-sub">Ozbolat Lab</div>
  </div>
  <div class="sync-pill"><div class="dot spin" id="sdot"></div><span id="slabel">Connecting</span></div>
</div>

<div class="bottom-bar">
  <input type="file" id="f-main-bar" accept="image/*" capture="environment" style="display:none" onchange="onMainFile(event)"/>
  <button class="bottom-add-btn" onclick="document.getElementById('f-main-bar').click()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2"/></svg>
    Tap to log a new package
  </button>
</div>
<div class="content">
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="s-today">—</div><div class="stat-l">Today</div></div>
    <div class="stat"><div class="stat-n" id="s-week">—</div><div class="stat-l">This week</div></div>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    <input class="search" id="search" placeholder="Search name, supplier, catalog…" oninput="renderList()"/>
  </div>
  <div class="chips" id="chips"></div>
  <div id="list"></div>
</div>


<!-- ADD SHEET -->
<div class="overlay" id="add-ov" onclick="if(event.target===this)closeAdd()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-hdr">
      <h2>New package</h2>
      <button class="x-btn" onclick="closeAdd()">
        <svg width="11" height="11" viewBox="0 0 11 11"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="photo-strip" id="pstrip"></div>
      <div class="ai-box" id="aibox" style="display:none"><div class="spinner" id="aispin"></div><span id="aimsg">Analyzing…</span></div>
      <div class="field"><label>Product name</label><input id="f-name" placeholder="e.g. GelMA Hydrogel 5%"/></div>
      <div class="row2">
        <div class="field"><label>Supplier</label><input id="f-sup" placeholder="e.g. Sigma"/></div>
        <div class="field"><label>Catalog / lot</label><input id="f-cat" placeholder="e.g. G1234"/></div>
      </div>
      <div class="row2">
        <div class="field"><label>Category</label>
          <select id="f-catg">
            <option value="">Select…</option>
            <option>Biomaterial</option><option>Reagent</option><option>Cell culture</option>
            <option>Consumable</option><option>Equipment</option><option>Printing material</option><option>Other</option>
          </select>
        </div>
        <div class="field"><label>Storage</label>
          <select id="f-stor">
            <option value="">Select…</option>
            <option>-80°C Freezer</option><option>-20°C Freezer</option>
            <option>4°C Fridge</option><option>Room temp</option><option>Dry storage</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Notes</label><input id="f-notes" placeholder="Expiry, project, conditions…"/></div>
      <div class="btns">
        <button class="btn" onclick="closeAdd()">Cancel</button>
        <button class="btn btn-g" id="savebtn" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="det-ov" onclick="if(event.target===this)closeDet()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-hdr">
      <h2 id="d-name"></h2>
      <button class="x-btn" onclick="closeDet()">
        <svg width="11" height="11" viewBox="0 0 11 11"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="dphotos" id="d-photos"></div>
      <div id="d-rows"></div>
      <div class="btns">
        <button class="btn btn-r" onclick="delItem()">Delete</button>
        <button class="btn btn-g" onclick="closeDet()">Done</button>
      </div>
    </div>
  </div>
</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBSKapCk66FSg7ruOman4WRXzQbRJ_j7kk",
  authDomain:"inventory-ol.firebaseapp.com",
  databaseURL:"https://inventory-ol-default-rtdb.firebaseio.com",
  projectId:"inventory-ol",
  storageBucket:"inventory-ol.firebasestorage.app",
  messagingSenderId:"647528240069",
  appId:"1:647528240069:web:72de037a6c20d9dcbb31ac"
});
const db = firebase.database();
const pkgs = db.ref('packages');

let items = [];
let imgs = [];
let detId = null;
let filter = '';

pkgs.on('value', snap => {
  items = [];
  snap.forEach(c => {
    const v = c.val();
    if (v.imgs && !Array.isArray(v.imgs)) v.imgs = Object.values(v.imgs);
    items.push({ id: c.key, ...v });
  });
  items.reverse();
  document.getElementById('sdot').className = 'dot';
  document.getElementById('slabel').textContent = 'Live';
  document.getElementById('header-sub').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '') + ' · Ozbolat Lab';
  updateStats();
  renderChips();
  renderList();
}, () => {
  document.getElementById('sdot').className = 'dot off';
  document.getElementById('slabel').textContent = 'Offline';
});

function updateStats() {
  const now = Date.now();
  document.getElementById('s-total').textContent = items.length;
  document.getElementById('s-today').textContent = items.filter(i => now - i.ts < 86400000).length;
  document.getElementById('s-week').textContent = items.filter(i => now - i.ts < 604800000).length;
}

function renderChips() {
  const cats = [...new Set(items.map(i => i.category).filter(Boolean))];
  document.getElementById('chips').innerHTML = ['All', ...cats].map(c =>
    `<button class="chip${(!filter&&c==='All')||(filter===c)?' on':''}" onclick="setFilter('${c==='All'?'':c}')">${c}</button>`
  ).join('');
}

function setFilter(f) { filter = f; renderChips(); renderList(); }

function renderList() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const filtered = items.filter(it => {
    const mq = !q || [it.name,it.supplier,it.catalog,it.storage,it.notes,it.category].some(f => f && f.toLowerCase().includes(q));
    const mf = !filter || it.category === filter;
    return mq && mf;
  });

  if (!filtered.length) {
    document.getElementById('list').innerHTML = `<div class="empty">
      <div style="font-size:36px">📦</div>
      <h3>${items.length === 0 ? 'No packages yet' : 'No matches'}</h3>
      <p style="font-size:13px">${items.length === 0 ? 'Tap + to add your first package' : 'Try a different search'}</p>
    </div>`;
    return;
  }

  document.getElementById('list').innerHTML = filtered.map(it => {
    const thumbImgs = it.imgs || (it.img ? [it.img] : []);
    const thumb = thumbImgs.length
      ? `<div class="thumb"><img src="${thumbImgs[0]}" alt=""/></div>`
      : `<div class="thumb"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 6V5a5 5 0 0 1 10 0v1" stroke="currentColor" stroke-width="1.4"/></svg></div>`;
    const isNew = Date.now() - it.ts < 86400000;
    return `<div class="item" onclick="openDet('${it.id}')">
      ${thumb}
      <div class="info">
        <div class="iname">${esc(it.name)}</div>
        <div class="isub">${esc([it.supplier, it.catalog].filter(Boolean).join(' · ') || 'No supplier info')}</div>
        <div class="tags">
          ${it.category ? `<span class="tag tag-blue">${esc(it.category)}</span>` : ''}
          ${it.storage ? `<span class="tag tag-green">${esc(it.storage)}</span>` : ''}
          ${isNew ? `<span class="tag tag-new">New</span>` : ''}
        </div>
      </div>
      <div class="idate">${fmtDate(it.ts)}</div>
    </div>`;
  }).join('');
}

// ── Add sheet ──
function openAdd() {
  imgs = [];
  clearForm();
}
function closeAdd() { document.getElementById('add-ov').classList.remove('open'); imgs = []; }

function clearForm() {
  ['f-name','f-sup','f-cat','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-catg').value = '';
  document.getElementById('f-stor').value = '';
  document.getElementById('aibox').style.display = 'none';
  document.getElementById('savebtn').disabled = false;
  document.getElementById('savebtn').textContent = 'Save';
}

function renderStrip() {
  const strip = document.getElementById('pstrip');
  strip.innerHTML = imgs.map((img, i) => `
    <div class="ptile">
      <img src="${img}" alt=""/>
      <button class="pdel" onclick="removeImg(${i})">×</button>
    </div>`).join('') +
    `<div class="padd" onclick="document.getElementById('f-more').click()">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.4"/><path d="M10 6v8M6 10h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Add photo
    </div>`;
}

function removeImg(i) { imgs.splice(i, 1); renderStrip(); }

function onMainFile(e) {
  const f = e.target.files[0]; if (!f) return; e.target.value = '';
  imgs = [];
  clearForm();
  compress(f, img => {
    imgs = [img];
    renderStrip();
    document.getElementById('add-ov').classList.add('open');
    analyze();
  });
}
function onMoreFile(e) {
  const f = e.target.files[0]; if (!f) return; e.target.value = '';
  compress(f, img => { imgs.push(img); renderStrip(); analyze(); });
}

function compress(file, cb) {
  const r = new FileReader();
  r.onload = ev => {
    const im = new Image();
    im.onload = () => {
      const MAX = 800;
      let w = im.width, h = im.height;
      if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(im, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.72));
    };
    im.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

let analyzeTimer;
function analyze() {
  clearTimeout(analyzeTimer);
  analyzeTimer = setTimeout(doAnalyze, 300);
}

async function doAnalyze() {
  if (!imgs.length) return;
  document.getElementById('aibox').style.display = 'flex';
  document.getElementById('aispin').style.display = '';
  document.getElementById('aimsg').textContent = 'Analyzing ' + imgs.length + ' photo' + (imgs.length > 1 ? 's' : '') + '…';
  document.getElementById('savebtn').disabled = true;

  const content = imgs.map(img => ({
    type: 'image',
    source: { type: 'base64', media_type: img.split(';')[0].split(':')[1] || 'image/jpeg', data: img.split(',')[1] }
  }));
  content.push({ type: 'text', text: `These are ${imgs.length} photo(s) of the same lab package. Read all visible text and identify the product.` });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: `You are a lab supply identifier for a bioprinting and biomedical research lab. Analyze all provided images — read every label, text, logo, and number on boxes, vials, bottles, tubes, or packaging. Multiple images may show different sides of the same item.

Return ONLY valid JSON (no markdown, no explanation):
{"name":"full product name exactly as on label","supplier":"manufacturer or brand","catalog":"catalog or lot number","category":"one of: Biomaterial, Reagent, Cell culture, Consumable, Equipment, Printing material, Other","storage":"one of: -80C Freezer, -20C Freezer, 4C Fridge, Room temp, Dry storage"}

Storage rules: GelMA/PEGDA/collagen/fibrinogen/bioink/growth factors → -20C Freezer. Antibodies/enzymes/cell media/serum → 4C Fridge. Cell lines/lentivirus → -80C Freezer. Plastics/tips/tubes/gloves → Room temp. Dry chemicals/powders → Dry storage. Make your best inference. Use empty string only if completely unreadable.`,
        messages: [{ role: 'user', content }]
      })
    });
    const data = await res.json();
    const txt = data.content?.map(b => b.text || '').join('') || '';
    let p = {};
    try { const m = txt.match(/\{[\s\S]*\}/); if (m) p = JSON.parse(m[0]); } catch(e) {}
    if (p.name) document.getElementById('f-name').value = p.name;
    if (p.supplier) document.getElementById('f-sup').value = p.supplier;
    if (p.catalog) document.getElementById('f-cat').value = p.catalog;
    if (p.category) document.getElementById('f-catg').value = p.category;
    if (p.storage) {
      const m = { '-80C Freezer':'-80°C Freezer','-20C Freezer':'-20°C Freezer','4C Fridge':'4°C Fridge','Room temp':'Room temp','Dry storage':'Dry storage' };
      document.getElementById('f-stor').value = m[p.storage] || p.storage;
    }
    document.getElementById('aispin').style.display = 'none';
    document.getElementById('aimsg').textContent = p.name ? '✓ Identified: ' + p.name : 'Could not identify — fill in manually';
  } catch(err) {
    document.getElementById('aispin').style.display = 'none';
    document.getElementById('aimsg').textContent = 'Could not identify — fill in manually';
  }
  document.getElementById('savebtn').disabled = false;
}

async function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const btn = document.getElementById('savebtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await pkgs.push({
      name,
      supplier: document.getElementById('f-sup').value.trim(),
      catalog: document.getElementById('f-cat').value.trim(),
      category: document.getElementById('f-catg').value,
      storage: document.getElementById('f-stor').value,
      notes: document.getElementById('f-notes').value.trim(),
      imgs,
      ts: Date.now()
    });
    closeAdd();
  } catch(e) {
    alert('Save failed: ' + e.message);
    btn.disabled = false; btn.textContent = 'Save';
  }
}

// ── Detail ──
function openDet(id) {
  const it = items.find(x => x.id === id); if (!it) return;
  detId = id;
  document.getElementById('d-name').textContent = it.name;
  const photos = it.imgs || (it.img ? [it.img] : []);
  document.getElementById('d-photos').innerHTML = photos.map(s => `<img src="${s}" alt=""/>`).join('');
  const rows = [['Supplier',it.supplier],['Catalog / lot',it.catalog],['Category',it.category],['Storage',it.storage],['Notes',it.notes],['Received',fmtDateTime(it.ts)]].filter(([,v])=>v);
  document.getElementById('d-rows').innerHTML = rows.map(([k,v]) =>
    `<div class="drow"><span class="dk">${esc(k)}</span><span class="dv">${esc(v)}</span></div>`
  ).join('');
  document.getElementById('det-ov').classList.add('open');
}
function closeDet() { document.getElementById('det-ov').classList.remove('open'); detId = null; }
async function delItem() {
  if (!detId || !confirm('Delete this item?')) return;
  await pkgs.child(detId).remove();
  closeDet();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtDateTime(ts) { return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
</script>
